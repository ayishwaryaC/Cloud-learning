global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: user-service
    metrics_path: /metrics
    static_configs:
      - targets: ['user-service:3000']

  - job_name: order-service
    metrics_path: /metrics
    static_configs:
      - targets: ['order-service:3000']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

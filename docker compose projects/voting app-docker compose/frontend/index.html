<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voting App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="brand">Voting App</div>
    <div class="subtitle">Vote, see results, and watch the team win.</div>
  </header>

  <main>
    <section class="card vote-card">
      <h2>Choose your favorite</h2>
      <p class="info">Pick one option below. After voting, you will be taken to the results page.</p>
      <div id="options" class="options"></div>
      <div id="message" class="message"></div>
    </section>
  </main>

  <!-- <footer>
    <p>Backend API: <span>http://localhost:8000</span></p>
  </footer> -->

  <script src="app.js"></script>
</body>
</html>
